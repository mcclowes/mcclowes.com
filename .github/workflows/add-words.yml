name: Add words to cspell.json

on:
  issue_comment:
    types: [created]

jobs:
  add-words:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/add-words')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.ref);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Extract words from spellcheck comment
        id: words
        uses: actions/github-script@v7
        with:
          script: |
            // Find the most recent spellcheck bot comment with word list
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            let words = [];
            // Search backwards for the most recent spellcheck comment
            for (const comment of comments.reverse()) {
              const match = comment.body.match(/<!-- cspell-words: (.+?) -->/);
              if (match) {
                words = match[1].split(',').map(w => w.trim()).filter(Boolean);
                break;
              }
            }

            if (words.length === 0) {
              core.setFailed('No spellcheck words found in PR comments.');
              return;
            }

            core.setOutput('words', JSON.stringify(words));
            console.log(`Found words: ${words.join(', ')}`);

      - name: Add words to cspell.json
        run: |
          WORDS='${{ steps.words.outputs.words }}'
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('cspell.json', 'utf8'));
            const newWords = JSON.parse(process.argv[1]);
            const merged = [...new Set([...config.words, ...newWords])].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
            config.words = merged;
            fs.writeFileSync('cspell.json', JSON.stringify(config, null, 2) + '\n');
            console.log('Updated cspell.json with words:', newWords.join(', '));
          " "$WORDS"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cspell.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Add words to cspell.json [skip ci]"
          git push
          echo "Pushed updated cspell.json"

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1',
            });

            const words = JSON.parse('${{ steps.words.outputs.words }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Added ${words.length} word(s) to \`.cspell.json\`: ${words.map(w => '`' + w + '`').join(', ')}`,
            });
